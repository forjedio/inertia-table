name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    name: Lint & Static Analysis

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, mbstring, pdo, sqlite, pdo_sqlite

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Run static analysis
        run: vendor/bin/phpstan analyse

  tests:
    runs-on: ubuntu-latest
    needs: checks

    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']

    name: PHP ${{ matrix.php }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, mbstring, pdo, sqlite, pdo_sqlite
          coverage: pcov

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        if: matrix.php != '8.5'
        run: vendor/bin/pest

      - name: Run tests with coverage
        if: matrix.php == '8.5'
        run: vendor/bin/pest --coverage --coverage-clover=coverage.xml

      - name: Extract coverage percentage
        if: matrix.php == '8.5' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: coverage
        run: |
          COVERAGE=$(php -r '
            $xml = simplexml_load_file("coverage.xml");
            $metrics = $xml->project->metrics;
            $total = (int) $metrics["statements"];
            $covered = (int) $metrics["coveredstatements"];
            echo $total > 0 ? round(($covered / $total) * 100, 1) : 0;
          ')
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT

          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then
            echo "color=brightgreen" >> $GITHUB_OUTPUT
          elif (( $(echo "$COVERAGE >= 75" | bc -l) )); then
            echo "color=green" >> $GITHUB_OUTPUT
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            echo "color=yellowgreen" >> $GITHUB_OUTPUT
          elif (( $(echo "$COVERAGE >= 50" | bc -l) )); then
            echo "color=yellow" >> $GITHUB_OUTPUT
          else
            echo "color=red" >> $GITHUB_OUTPUT
          fi

      - name: Update coverage badge
        if: matrix.php == '8.5' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: inertia-table-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          color: ${{ steps.coverage.outputs.color }}
